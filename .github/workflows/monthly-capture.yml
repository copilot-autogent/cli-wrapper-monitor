# Monthly baseline capture — PR flow.
#
# Runs on the 3rd of every month at 00:00 UTC.  On each run it:
#   1. Checks out autogent source (using AUTOGENT_PAT).
#   2. Captures a fresh baseline snapshot via `npm run capture`.
#   3. Commits the new baseline + health log to a dated branch
#      (even on capture failure so artefacts are preserved).
#   4. Opens a PR titled "baseline: YYYY-MM <capture_reason> capture".
#   5. Posts a Discord success or failure notification.
#
# Secrets required:
#   AUTOGENT_PAT        — PAT with `contents: read` on
#                         JackywithaWhiteDog/autogent (for static source
#                         extraction). Falls back to github.token for public
#                         repo access when absent.
#                         NOTE: an Actions secret must NOT use the reserved
#                         GITHUB_ prefix, hence AUTOGENT_PAT (not GITHUB_*).
#   MODELS_API_TOKEN    — Fine-grained PAT with the "Models" permission
#                         (account-level, read-only).  Required for refusal-rate
#                         probes and context-tax live mode (GitHub Models API at
#                         models.inference.ai.azure.com).
#                         Without this secret all probe calls return 401 and
#                         dangerousRefusedRate / safeAllowedRate stay at 0.
#                         AUTOGENT_PAT does NOT include the models permission —
#                         keep them as separate least-privilege secrets.
#   DISCORD_WEBHOOK_URL — incoming webhook URL; absent → no notification.
name: Monthly Capture (PR flow)

on:
  schedule:
    - cron: '0 0 3 * *'  # 3rd of every month at 00:00 UTC
  workflow_dispatch:
    inputs:
      capture_reason:
        description: 'Label for this capture (added to PR title and notification)'
        required: false
        default: 'scheduled'
        type: string
      send_discord_notification:
        description: 'Send Discord notification on completion'
        required: false
        default: true
        type: boolean

jobs:
  capture:
    name: Capture baseline and open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: monthly-capture
      cancel-in-progress: false
    steps:
      # -----------------------------------------------------------------------
      # 0. Initialise month variables.
      # -----------------------------------------------------------------------
      - name: Set month variables
        run: |
          YEAR_MONTH=$(date +%Y-%m)
          echo "YEAR_MONTH=${YEAR_MONTH}" >> "$GITHUB_ENV"
          echo "BRANCH=baseline/${YEAR_MONTH}" >> "$GITHUB_ENV"
          # Write CAPTURE_REASON using a unique per-run delimiter to prevent
          # env-file injection even if the input itself contains newlines.
          # (A static 'DELIMITER' string could be matched by crafted input.)
          UNIQUE_DELIM="DELIM_${YEAR_MONTH}_$(head -c 8 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | head -c 8)"
          {
            echo "CAPTURE_REASON<<${UNIQUE_DELIM}"
            printf '%s' "${CAPTURE_REASON_RAW}"
            echo ""
            echo "${UNIQUE_DELIM}"
          } >> "$GITHUB_ENV"
        env:
          CAPTURE_REASON_RAW: ${{ inputs.capture_reason || 'scheduled' }}

      - name: Checkout cli-wrapper-monitor
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Checkout autogent source
        id: checkout_autogent
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: JackywithaWhiteDog/autogent
          # AUTOGENT_PAT → higher rate limits + works if repo goes private.
          # Falls back to github.token which can read public repos without a PAT.
          token: ${{ secrets.AUTOGENT_PAT || github.token }}
          ref: main
          path: autogent-src
          fetch-depth: 1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve autogent path
        run: |
          if [ "${{ steps.checkout_autogent.outcome }}" = "success" ] && \
             [ -d autogent-src/src ]; then
            echo "AUTOGENT_PATH=${{ github.workspace }}/autogent-src" >> "$GITHUB_ENV"
            echo "Autogent source available at autogent-src/"
          else
            echo "Autogent source not available — capture will use static fallback."
          fi

      - name: Create capture branch
        id: create_branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin "${BRANCH}" > /dev/null 2>&1; then
            echo "Branch ${BRANCH} already exists — fetching and checking out."
            git fetch origin "${BRANCH}"
            git checkout -b "${BRANCH}" "origin/${BRANCH}"
          else
            git checkout -b "${BRANCH}"
          fi

      - name: Run capture
        id: run_capture
        continue-on-error: true
        env:
          # MODELS_API_TOKEN must be a fine-grained PAT with the "Models"
          # (read) permission.  ModelsApiClient reads this env var first so
          # it stays separate from GITHUB_TOKEN (used by provenance fetch,
          # alert-issue-filer, and other GitHub REST API calls).
          MODELS_API_TOKEN: ${{ secrets.MODELS_API_TOKEN }}
          # GITHUB_TOKEN provides access to the GitHub REST API (provenance
          # search, alert-issue filing).  AUTOGENT_PAT has contents:read on
          # the autogent repo; it lacks models permission — keep it separate.
          GITHUB_TOKEN: ${{ secrets.AUTOGENT_PAT || secrets.GITHUB_TOKEN }}
          # Enable live token-count mode for context-tax (requires a models-
          # capable token; ContextTaxExperiment falls back to static on error,
          # so this is safe to always enable).
          LIVE_MODE: "true"
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npm run capture

      - name: Commit baseline artefacts
        id: commit
        if: steps.create_branch.outcome == 'success'
        run: |
          [ -e logs ] && git add logs

          if [ "${{ steps.run_capture.outcome }}" = "success" ]; then
            for path in baselines chart.svg reports; do
              [ -e "${path}" ] && git add "${path}"
            done
          fi

          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Nothing new to commit — baseline is unchanged."
          else
            CAPTURE_STATUS="${{ steps.run_capture.outcome }}"
            git commit -m "baseline: ${YEAR_MONTH} ${CAPTURE_REASON} capture (${CAPTURE_STATUS}) [skip ci]"
            git push --force-with-lease origin "${BRANCH}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Committed and pushed to ${BRANCH}."
          fi

      - name: Open PR
        id: pr
        if: steps.run_capture.outcome == 'success' && steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh pr list --head "${BRANCH}" --state open --json url --jq '.[0].url // ""')
          if [ -n "${EXISTING}" ]; then
            echo "PR already open: ${EXISTING}"
            echo "pr_url=${EXISTING}" >> "$GITHUB_OUTPUT"
          else
            PR_TITLE="baseline: ${YEAR_MONTH} ${CAPTURE_REASON} capture"
            {
              echo "Automated baseline capture for ${YEAR_MONTH} (${CAPTURE_REASON})."
              echo ""
              echo "Generated by the \`monthly-capture\` GitHub Actions workflow."
              echo ""
              echo "Part of #65"
            } > /tmp/pr-body.md
            PR_URL=$(gh pr create \
              --repo "${{ github.repository }}" \
              --title "${PR_TITLE}" \
              --body-file /tmp/pr-body.md \
              --base main \
              --head "${BRANCH}")
            echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
            echo "PR opened: ${PR_URL}"
          fi

      # -----------------------------------------------------------------------
      # Notify Discord (success)
      # inputs.send_discord_notification is boolean; `!= false` handles both
      # boolean false and the absent-input case (scheduled runs always notify).
      # -----------------------------------------------------------------------
      - name: Notify Discord (success)
        if: |
          steps.run_capture.outcome == 'success' &&
          steps.commit.outcome != 'failure' &&
          (github.event_name == 'schedule' || inputs.send_discord_notification != false)
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping notification."
            exit 0
          fi
          PR_LINK="${{ steps.pr.outputs.pr_url }}"
          if [ -n "${PR_LINK}" ]; then
            MSG="✅ Monthly baseline captured for \`${YEAR_MONTH}\` (${CAPTURE_REASON}) — PR: ${PR_LINK}"
          else
            MSG="✅ Monthly baseline captured for \`${YEAR_MONTH}\` (${CAPTURE_REASON}) — baseline unchanged, no PR opened."
          fi
          PAYLOAD=$(jq -nc --arg content "${MSG}" '{"content":$content}')
          curl -s -o /dev/null -w "Discord response: %{http_code}\n" \
            -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" -d "${PAYLOAD}"

      # -----------------------------------------------------------------------
      # Notify Discord (failure)
      # Also explicitly checks run_capture outcome because continue-on-error
      # prevents run_capture failures from propagating to failure() directly.
      # -----------------------------------------------------------------------
      - name: Notify Discord (failure)
        if: |
          (failure() || steps.run_capture.outcome == 'failure') &&
          (github.event_name == 'schedule' || inputs.send_discord_notification != false)
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping notification."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="❌ Monthly baseline workflow failed for \`${YEAR_MONTH:-unknown}\` (${CAPTURE_REASON:-unknown}). Check run: ${RUN_URL}"
          PAYLOAD=$(jq -nc --arg content "${MSG}" '{"content":$content}')
          curl -s -o /dev/null -w "Discord response: %{http_code}\n" \
            -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" -d "${PAYLOAD}"

      - name: Fail on capture error
        if: steps.run_capture.outcome == 'failure'
        run: |
          echo "Capture script exited non-zero. Check logs above for details."
          exit 1
