# Monthly baseline capture — PR flow.
#
# Runs on the 3rd of every month at 00:00 UTC.  On each run it:
#   1. Checks out autogent source (using AUTOGENT_PAT).
#   2. Captures a fresh baseline snapshot via `npm run capture`.
#   3. Commits the new baseline + health log to a dated branch
#      (even on capture failure so artefacts are preserved).
#   4. Opens a PR titled "baseline: YYYY-MM capture".
#   5. Posts a Discord success or failure notification.
#
# Secrets required:
#   AUTOGENT_PAT        — PAT with `contents: read` on
#                         JackywithaWhiteDog/autogent (for static source
#                         extraction). Also passed as GITHUB_TOKEN to enable
#                         the refusal-rate experiment (GitHub Models API).
#                         Absent → capture degrades to a static fallback.
#                         NOTE: an Actions secret must NOT use the reserved
#                         GITHUB_ prefix, hence AUTOGENT_PAT (not GITHUB_*).
#   DISCORD_WEBHOOK_URL — incoming webhook URL; absent → no notification.
name: Monthly Capture (PR flow)

on:
  schedule:
    - cron: '0 0 3 * *'  # 3rd of every month at 00:00 UTC
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Full capture: fires on schedule and manual workflow_dispatch.
  # Creates a dated branch, runs the capture, commits artefacts, opens a PR,
  # and posts a Discord notification for success or failure.
  # ---------------------------------------------------------------------------
  capture:
    name: Capture baseline and open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: monthly-capture
      cancel-in-progress: false
    steps:
      # -----------------------------------------------------------------------
      # 0. Initialise month variables immediately so they are available even if
      #    later steps fail (needed by the Discord failure notification).
      # -----------------------------------------------------------------------
      - name: Set month variables
        run: |
          YEAR_MONTH=$(date +%Y-%m)
          echo "YEAR_MONTH=${YEAR_MONTH}" >> "$GITHUB_ENV"
          echo "BRANCH=baseline/${YEAR_MONTH}" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # 1. Check out the monitor repo (full history for git log in script)
      # -----------------------------------------------------------------------
      - name: Checkout cli-wrapper-monitor
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use AUTOGENT_PAT so the subsequent push is authenticated (falls
          token: ${{ secrets.AUTOGENT_PAT || github.token }}

      # -----------------------------------------------------------------------
      # 2. Check out autogent source for static extraction
      # -----------------------------------------------------------------------
      - name: Checkout autogent source
        id: checkout_autogent
        uses: actions/checkout@v4
        # continue-on-error so the rest of the workflow still runs even
        # when the secret is missing or the repo is temporarily unavailable.
        continue-on-error: true
        with:
          repository: JackywithaWhiteDog/autogent
          token: ${{ secrets.AUTOGENT_PAT }}
          ref: main
          path: autogent-src
          fetch-depth: 1

      # -----------------------------------------------------------------------
      # 3. Build environment
      # -----------------------------------------------------------------------
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # 4. Resolve AUTOGENT_PATH
      # -----------------------------------------------------------------------
      - name: Resolve autogent path
        run: |
          if [ "${{ steps.checkout_autogent.outcome }}" = "success" ] && \
             [ -d autogent-src/src ]; then
            echo "AUTOGENT_PATH=${{ github.workspace }}/autogent-src" >> "$GITHUB_ENV"
            echo "Autogent source available at autogent-src/"
          else
            echo "Autogent source not available — capture will use static fallback."
          fi

      # -----------------------------------------------------------------------
      # 5. Create or reset the capture branch
      # -----------------------------------------------------------------------
      - name: Create capture branch
        id: create_branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # If the branch already exists on the remote (re-run in same month),
          # fetch and check it out rather than failing with branch-exists error.
          if git ls-remote --exit-code origin "${BRANCH}" > /dev/null 2>&1; then
            echo "Branch ${BRANCH} already exists — fetching and checking out."
            git fetch origin "${BRANCH}"
            git checkout -b "${BRANCH}" "origin/${BRANCH}"
          else
            git checkout -b "${BRANCH}"
          fi

      # -----------------------------------------------------------------------
      # 6. Run the baseline capture
      # -----------------------------------------------------------------------
      - name: Run capture
        id: run_capture
        # continue-on-error keeps the workflow alive when the script exits
        # non-zero (e.g., regressions detected) so we can still commit the
        # snapshot artefacts and surface the failure as a red run / Discord alert.
        continue-on-error: true
        env:
          # Map AUTOGENT_PAT → GITHUB_TOKEN so the refusal-rate
          # experiment (GitHub Models API) and provenance lookups work.
          GITHUB_TOKEN: ${{ secrets.AUTOGENT_PAT || secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npm run capture

      # -----------------------------------------------------------------------
      # 7. Commit artefacts to the capture branch.
      #    Health log is always staged (failure streak data must be preserved).
      #    Baseline data artefacts are only staged on a successful capture to
      #    avoid committing partial or deleted data from a failed run.
      # -----------------------------------------------------------------------
      - name: Commit baseline artefacts
        id: commit
        if: steps.create_branch.outcome == 'success'
        run: |
          # Always stage the health log — it is append-only and safe to commit
          # even when the capture itself errored.
          [ -e logs ] && git add logs

          # Only stage data artefacts when capture succeeded to avoid
          # committing partially-written or deleted files from a failed run.
          if [ "${{ steps.run_capture.outcome }}" = "success" ]; then
            for path in baselines chart.svg reports; do
              [ -e "${path}" ] && git add "${path}"
            done
          fi

          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Nothing new to commit — baseline is unchanged."
          else
            CAPTURE_STATUS="${{ steps.run_capture.outcome }}"
            git commit -m "baseline: ${YEAR_MONTH} capture (${CAPTURE_STATUS}) [skip ci]"
            # --force-with-lease is safe: we own this branch and it avoids
            # a non-fast-forward error when a same-month re-run re-pushes.
            git push --force-with-lease origin "${BRANCH}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Committed and pushed to ${BRANCH}."
          fi

      # -----------------------------------------------------------------------
      # 8. Open the PR (only on successful capture with new artefacts)
      # -----------------------------------------------------------------------
      - name: Open PR
        id: pr
        if: steps.run_capture.outcome == 'success' && steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOGENT_PAT || github.token }}
        run: |
          # If a PR already exists for this branch (re-run in same month),
          # reuse it rather than failing with a duplicate-PR error.
          EXISTING=$(gh pr list --head "${BRANCH}" --state open --json url --jq '.[0].url // ""')
          if [ -n "${EXISTING}" ]; then
            echo "PR already open: ${EXISTING}"
            echo "pr_url=${EXISTING}" >> "$GITHUB_OUTPUT"
          else
            # Write body to a temp file using indented here-doc lines so the
            # YAML `run: |` block scalar is not terminated by column-0 content
            # (a bare unindented here-doc body is invalid YAML and caused the
            # whole workflow to fail at startup). Use grouped echoes instead.
            {
              echo "Automated monthly baseline capture for ${YEAR_MONTH}."
              echo ""
              echo 'Generated by the `monthly-capture` GitHub Actions workflow.'
              echo ""
              echo "Part of #65"
            } > /tmp/pr-body.md
            PR_URL=$(gh pr create \
              --repo "${{ github.repository }}" \
              --title "baseline: ${YEAR_MONTH} capture" \
              --body-file /tmp/pr-body.md \
              --base main \
              --head "${BRANCH}")
            echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
            echo "PR opened: ${PR_URL}"
          fi

      # -----------------------------------------------------------------------
      # 9. Discord success notification
      # -----------------------------------------------------------------------
      - name: Notify Discord (success)
        # Only fire when capture AND post-capture steps (commit, pr) all succeeded.
        if: steps.run_capture.outcome == 'success' && steps.commit.outcome != 'failure'
        # continue-on-error so a curl/jq failure doesn't fail the job run.
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping notification."
            exit 0
          fi
          PR_LINK="${{ steps.pr.outputs.pr_url }}"
          if [ -n "${PR_LINK}" ]; then
            MSG="✅ Monthly baseline captured for \`${YEAR_MONTH}\` — PR: ${PR_LINK}"
          else
            MSG="✅ Monthly baseline captured for \`${YEAR_MONTH}\` — baseline unchanged, no PR opened."
          fi
          # Use jq to safely build the JSON payload so special chars in MSG are escaped.
          PAYLOAD=$(jq -nc --arg content "${MSG}" '{"content":$content}')
          curl -s -o /dev/null -w "Discord response: %{http_code}\n" \
            -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" -d "${PAYLOAD}"

      # -----------------------------------------------------------------------
      # 10. Discord failure notification
      # -----------------------------------------------------------------------
      - name: Notify Discord (failure)
        # failure() covers all failure cases: infra failures, capture errors,
        # and post-capture step failures (push, PR creation).
        if: failure()
        # continue-on-error so a jq/curl hiccup here doesn't change the job
        # outcome — the run is already failed; notification is best-effort.
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL not set — skipping notification."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="❌ Monthly baseline workflow failed for \`${YEAR_MONTH:-unknown}\`. Check run: ${RUN_URL}"
          PAYLOAD=$(jq -nc --arg content "${MSG}" '{"content":$content}')
          curl -s -o /dev/null -w "Discord response: %{http_code}\n" \
            -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" -d "${PAYLOAD}"

      # -----------------------------------------------------------------------
      # 11. Fail the workflow when the capture exited non-zero so GitHub
      #     marks the run red and triggers any configured notifications.
      # -----------------------------------------------------------------------
      - name: Fail on capture error
        if: steps.run_capture.outcome == 'failure'
        run: |
          echo "Capture script exited non-zero. Check logs above for details."
          exit 1
