name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc
      - run: npm run validate
      - run: npm test

  # Lint GitHub Actions workflow YAML so a malformed workflow (e.g. the
  # here-doc-in-block-scalar bug that silently broke monthly-capture.yml on
  # every run) is caught in CI instead of only surfacing as a startup_failure.
  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        # Pin both the installer script (release tag) and the binary version so
        # CI is reproducible and not exposed to upstream `main` script drift.
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7
          ./actionlint -color
